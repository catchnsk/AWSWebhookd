apiVersion: v1
kind: Secret
metadata:
  name: delivery-listener-secret
  namespace: delivery
  labels:
    app: delivery-listener
type: Opaque
# ============================================================
# IMPORTANT: Do NOT commit real values here.
# Inject via Sealed Secrets, AWS Secrets Manager CSI driver,
# or a GitOps secret management solution.
# ============================================================
stringData:
  # Admin API credentials (BCrypt password recommended)
  ADMIN_USERNAME: "admin"
  # Generate BCrypt hash: htpasswd -bnBC 10 "" yourpassword | tr -d ':\n' | sed 's/$2y/$2a/'
  ADMIN_PASSWORD: "{noop}REPLACE_WITH_BCRYPT_HASH"

  # OAuth2 client credentials for subscriber auth (if subscriberAuthType=CLIENT_CREDENTIALS)
  # Only needed if any subscriber uses CLIENT_CREDENTIALS auth
  OAUTH_CLIENT_ID: "REPLACE_WITH_CLIENT_ID"
  OAUTH_CLIENT_SECRET: "REPLACE_WITH_CLIENT_SECRET"
